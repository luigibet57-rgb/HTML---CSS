<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modelo de caixas</title>
    <style>
        h1 {
            background-color: lightblue;
            width: 300px;
           height: 300px;
           border: 10px solid black;

           padding: 10px;
            margin: auto;
            outline: 5px dashed salmon;
        }
        a {
            background-color: lightgreen;
            width: 300px;
           height: 300px;
           border-width: 10px;
           border-color: black;
           border-style: solid;
        }

    </style>
</head>
<body>
    <h1>exemplo de caixa box-level</h1>
    <p>parabens tambem sao exemplos de box-level, mas os <a href="#">links sao exemplos de caixas inline-level</a>.Vamos ver como tudo isso funciona</p>
</body>
</html>
