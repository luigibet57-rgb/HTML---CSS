<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grouping tags</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightblue;
        }
        header {
            background-color: lightgreen;
    
            padding: 10px;
            margin: 0px;
   
        }
        main {
            background-color: lightyellow;
            
            padding: 10px;
            margin: auto;
      
            border-radius: 10px 20px 30px 40px;
        }
        article {
            background-color: lightgray;
            padding: 10px;
        }
        article>aside {
            background-color: lightpink;

        }
         nav {
            background-color: lightcyan;
            padding: 5px;
            box-shadow: 2px 3px 7px 2px rgba(0, 0, 0, 0.503);
            border-radius: 10px, 10px;
        
        }
         nav a {
             background-color: white;
             text-decoration: none;
             color: black;
             margin-right: 30px;
         }
         nav a:hover {
            text-decoration: underline;
            background-color: lightgray;
         }
        footer {
            background-color: lightcoral;

            color: white;
            padding: 4px;
            margin: 0px;
            text-align: center;
        }
        footer p {
            margin: 0px;
        }
        div#bola {
            width: 100px;
            height: 100px;
            background-color: rgb(0, 20, 19);
            border-radius: 50%;
            margin: 10px;
            border-radius: 50%;
        }


    </style>
</head>
<body>
    <header>
        <h1>exemplo de agrupamento de tags</h1>
        <nav>
            <a href="#">link</a>
            <a href="#">link</a>
            <a href="#">link</a>
            <a href="#">link</a>
            <a href="#">link</a>
        </nav>
    </header>
    <main>
        <section id="assuntos">
                <h2>assunto 1</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
                <h2>assunto 2</h2>
        </section>
        <section id="noticias">
                <article>
                    <aside>
                        <h2>noticia 1</h2>
                        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
                        <h2>noticia 2</h2>
                    </aside>
                </article>
        </section>


    </main>
    <footer>
        <p>Desenvolvido por luigi</p>
    </footer>
    <div id="bola"></div>

</body>
</html>
